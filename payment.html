<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="container text-center glass-card p-4 rounded-4 shadow-lg" style="max-width: 450px;">
        
        <div id="loadingSection">
            <h4 class="mb-3">Generating Secure Payment...</h4>
            <div class="spinner-border text-info mb-3" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-white-50">Please wait, connecting to server.</p>
        </div>

        <div id="paymentSection" style="display: none;">
            <h4 class="fw-bold mb-1">Scan & Pay Exact Amount</h4>
            <p class="text-warning small mb-3">Pay exactly the amount below for auto-verification.</p>

            <img src="qr.png" alt="PhonePe QR" class="qr-code mb-3 img-fluid">

            <div class="bg-dark rounded-3 p-3 mb-3 border border-secondary shadow-inner">
                <span class="text-white-50 d-block mb-1">Amount to Pay</span>
                <h1 class="display-3 fw-bold text-success mb-0" id="payAmount">₹0.00</h1>
            </div>

            <div class="d-flex justify-content-between mb-3 px-2 text-white-50 small">
                <span>UPI ID: <strong id="upiIdDisplay" class="text-white">loading...</strong></span>
                <span>Time Left: <strong id="timerDisplay" class="text-danger fs-5">02:00</strong></span>
            </div>

            <div class="alert alert-info py-2 fw-bold" id="statusMessage">Waiting for payment...</div>
            <a href="index.html" class="btn btn-outline-secondary btn-sm mt-2">Cancel Transaction</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
