<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .stat-card { transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .table-custom { background: rgba(0,0,0,0.2) !important; border-radius: 10px; }
        .table-custom th { color: #0dcaf0; font-weight: 600; letter-spacing: 1px; }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .search-box:focus { background: rgba(255,255,255,0.1); color: white; box-shadow: 0 0 10px rgba(13,202,240,0.5); border-color: #0dcaf0; }
    </style>
</head>
<body class="bg-dark text-light p-3 p-md-4">
    <div id="loginSection" class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="glass-card p-5 rounded-4 shadow-lg text-center" style="max-width: 400px; width: 100%;">
            <div class="bg-info bg-opacity-10 rounded-circle d-inline-block p-3 mb-3 shadow">
                <i class="bi bi-shield-lock-fill fs-1 text-info"></i>
            </div>
            <h3 class="fw-bold mb-4">Admin Secure Login</h3>
            <div class="input-group mb-4 shadow-sm">
                <span class="input-group-text bg-dark border-secondary text-info"><i class="bi bi-key-fill"></i></span>
                <input type="password" id="adminPassword" class="form-control bg-dark text-light border-secondary text-center" placeholder="Enter Password">
            </div>
            <button onclick="checkPassword()" class="btn btn-info w-100 rounded-pill fw-bold glow-btn text-white py-2">
                Unlock Dashboard <i class="bi bi-arrow-right-circle ms-2"></i>
            </button>
        </div>
    </div>
    <div id="dashboardSection" class="container-fluid" style="display: none; max-width: 1200px;">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
            <div>
                <h2 class="fw-bold text-info m-0"><i class="bi bi-grid-1x2-fill me-2"></i>Business Overview</h2>
                <small class="text-white-50">Real-time automatic payment verification system</small>
            </div>
            <div class="mt-3 mt-md-0 d-flex gap-2">
                <button onclick="location.reload()" class="btn btn-outline-light btn-sm rounded-pill px-3 shadow-sm"><i class="bi bi-arrow-clockwise me-1"></i> Refresh</button>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill px-3 shadow-sm"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
            </div>
        </div>
        <div class="row mb-4 g-3">
            <div class="col-md-6 col-lg-4">
                <div class="glass-card p-4 rounded-4 shadow-sm stat-card border-success border-start border-5 h-100 position-relative overflow-hidden">
                    <i class="bi bi-wallet2 position-absolute text-success opacity-25" style="font-size: 5rem; right: -10px; bottom: -20px;"></i>
                    <h5 class="text-white-50 mb-1">Total Revenue</h5>
                    <h1 class="text-success fw-bold display-5 m-0" id="totalRevenue">₹0.00</h1>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="glass-card p-4 rounded-4 shadow-sm stat-card border-info border-start border-5 h-100 position-relative overflow-hidden">
                    <i class="bi bi-check-circle position-absolute text-info opacity-25" style="font-size: 5rem; right: -10px; bottom: -20px;"></i>
                    <h5 class="text-white-50 mb-1">Verified Payments</h5>
                    <h1 class="text-info fw-bold display-5 m-0" id="totalCount">0</h1>
                </div>
            </div>
            <div class="col-md-12 col-lg-4">
                <div class="glass-card p-4 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center align-items-center bg-info bg-opacity-10 border border-info border-opacity-25">
                    <div class="spinner-grow text-success mb-2" role="status" style="width: 2rem; height: 2rem;"></div>
                    <h5 class="fw-bold text-light m-0">System Live</h5>
                    <small class="text-white-50">Monitoring Emails...</small>
                </div>
            </div>
        </div>
        <div class="glass-card p-3 rounded-4 mb-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-transparent border-secondary text-info"><i class="bi bi-search"></i></span>
                <input type="text" id="searchInput" onkeyup="filterTable()" class="form-control search-box" placeholder="Search by Txn ID or Amount...">
            </div>
            <button onclick="exportToCSV()" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm glow-btn"><i class="bi bi-file-earmark-excel-fill me-2"></i> Export to CSV</button>
        </div>
        <div class="glass-card p-4 rounded-4 shadow-lg overflow-hidden">
            <h5 class="mb-3 text-info fw-bold"><i class="bi bi-list-columns-reverse me-2"></i>Recent Transactions</h5>
            <div class="table-responsive" style="max-height: 500px;">
                <table class="table table-dark table-hover align-middle table-custom m-0">
                    <thead style="position: sticky; top: 0; z-index: 1; background: #1a2235;">
                        <tr>
                            <th class="py-3">#</th>
                            <th class="py-3">Amount</th>
                            <th class="py-3">Transaction ID</th>
                            <th class="py-3">Date & Time</th>
                            <th class="py-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="transactionBody">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-info" role="status"></div>
                                <p class="mt-3 text-white-50 mb-0 fw-bold">Syncing with Database...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
